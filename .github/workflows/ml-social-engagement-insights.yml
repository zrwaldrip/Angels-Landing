name: Social engagement explanatory insights writer

on:
  workflow_dispatch:
  schedule:
    - cron: "10 3 * * *" # Daily; run before/around engagement scorer

jobs:
  write-insights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_scripts/requirements.txt

      - name: Run social engagement insights writer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ml_scripts/social_engagement_insights_writer.py

