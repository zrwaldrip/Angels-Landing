name: Daily Resident Progress ML Scorer

on:
  schedule:
    - cron: '0 2 * * *' # Daily 2:00 AM UTC — trains from Supabase when possible, then scores
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_scripts/requirements.txt

      - name: Execute Score Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python ml_scripts/nightly_scorer.py
