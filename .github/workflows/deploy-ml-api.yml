name: Deploy ML API (FastAPI) to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - "ml-api/**"
      - "ml_scripts/**"
      - "backend/AngelsLandingv2.API/SeedData/social_media_posts.csv"
      - ".github/workflows/deploy-ml-api.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install trainer + api dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_scripts/requirements.txt
          pip install -r ml-api/requirements.txt

      - name: Build model artifact for ML API package
        run: |
          mkdir -p ml-api/models
          python ml_scripts/train_social_engagement.py --out-model ml-api/models/social_engagement_predictor.pkl --out-predictions-json /tmp/ignore.json

      # Azure zip deploy does not always run Oryx pip install (uvicorn missing on server). Bundle a
      # Linux venv + app code so the Web App starts without relying on SCM_DO_BUILD_DURING_DEPLOYMENT.
      - name: Stage runtime package (ml_scripts + antenv)
        run: |
          rm -rf ml-api/ml_scripts
          cp -r ml_scripts ml-api/ml_scripts
          cd ml-api
          python -m venv antenv
          ./antenv/bin/pip install --upgrade pip
          ./antenv/bin/pip install -r requirements.txt

      - name: Zip deployment package
        run: |
          cd ml-api
          zip -r ../ml-api-package.zip . -x "**/__pycache__/*" -x "**/*.pyc"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_ML_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_ML_API_PUBLISH_PROFILE }}
          package: ml-api-package.zip

