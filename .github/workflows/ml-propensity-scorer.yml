name: Nightly Propensity Scorer

on:
  schedule:
    - cron: '30 2 * * *' # Every day at 2:30 AM UTC (30 min after resident scorer)
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  run-propensity-scorer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_scripts/requirements.txt

      - name: Execute Propensity Scorer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python ml_scripts/propensity_scorer.py
